name: deploy AKS

on: 
  workflow_run:
   workflows: ["Build and Push to ACR"]
   types:
    - completed
permissions:
  id-token: write
  contents: read
jobs:
  deploy_aks:
    runs-on: ubuntu-latest
    steps: 
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Azure Login
      uses: Azure/login@v3
      with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: AKS Login (wemogy)
      uses: wemogy/aks-login-action@1.2.1
      with:
       name: aks-cluster
       resource-group: Vivek_AKS_RG
    - name: login to AKS
      run: kubectl apply -f deployment.yaml
