name: deploy to akss

on:
 # workflow_dispatch:
 workflow_run: 
  workflows: ["Build and Push to ACR"]
  types: 
   - completed
 workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod
permissions:
 id-token: write
 contents: write

jobs:
  deploy: 
    if: |
         github.event.workflow_run.conclusion == 'success'||
         github.event_name == 'workflow_dispatch'
    
    runs-on: ubuntu-latest
    steps:
     - name: checkout code
       uses: actions/checkout@v4
       with:
        token: ${{ secrets.GITHUB_TOKEN }}
     - name: Update deployment image
       run: |
        # sed -i "s|image:.*|image: acr222.azurecr.io/microtodo:${{ github.event.workflow_run.run_number }}|g" manifests/templates/deployment.yaml
          sed -i "s/tag:.*/tag: "${{github.event.workflow_run.run_number}}"/" manifests/values-${{github.event.inputs.environment}}.yaml
     # - name: helm deploy
     #   run: |
     #    helm upgrade --install dev ./manifests
     - name: Commit changes
       run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/values-dev.yaml
          git commit -m "Update image tag to ${{ github.run_number }}" || exit 0
          git push
